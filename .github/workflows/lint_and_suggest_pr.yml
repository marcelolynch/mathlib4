on:
  pull_request

name: lint and suggest

jobs:
  lint_and_suggest:
    if: github.repository == 'leanprover-community/mathlib4' && github.event.pull_request.draft == false
    name: Lint and suggest
    runs-on: ubuntu-latest
    steps:
      - uses: leanprover-community/lint-style-action@e6128ab22cb03b509075ae46c33727e3952ffab7 # 2026-05-12
        with:
          mode: suggest
          lint-bib-file: true
